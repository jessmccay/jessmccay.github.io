<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Arlee Montana Nature Guide</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
<header>
    <h3>Arlee, Montana</h3>
    <h1>Plant & Animal Guide</h1>
    <nav>
        <button id="btnPlants">Plants</button>
        <button id="btnAnimals">Animals</button>
    </nav>
</header>
<main>
    <section id="plantsSection" class="info-section">
        <h2>Plants</h2>
        <div class="cards-container" id="plantsList"></div>
    </section>
    <section id="animalsSection" class="info-section hidden">
        <h2>Animals</h2>
        <div class="cards-container" id="animalsList"></div>
    </section>
    <section id="detailsSection" class="details hidden">
        <button id="closeDetails">Close</button>
        <h3 id="detailsName"></h3>
        <img id="detailsImage" alt="" />
        <p id="detailsDescription"></p>
    </section>
</main>
<script src="script.js"></script>
</body>
</html>
